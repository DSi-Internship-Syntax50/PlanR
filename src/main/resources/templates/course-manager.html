<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Manager - PlanR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-[#f3f6f8]">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="ml-64 flex flex-col min-h-screen">
        <div th:replace="~{fragments/header :: header}"></div>

        <main class="flex-1 p-8">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-3xl font-extrabold text-gray-900">Course Management</h1>
                    <p class="text-gray-500 mt-1 text-sm">Create, update, and filter academic courses.</p>
                </div>
                <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-bold shadow flex items-center gap-2">
                    <i class="fas fa-plus"></i> Add New Course
                </button>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6 flex gap-4 items-end">
                <form action="/admin/courses" method="get" class="flex gap-4 w-full">
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Department</label>
                        <select name="filterDept" class="w-full bg-gray-50 border border-gray-200 rounded p-2 text-sm outline-none">
                            <option value="">All Departments</option>
                            <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.shortCode}" th:selected="${d.id == filterDept}"></option>
                        </select>
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Level (Year)</label>
                        <select name="filterYear" class="w-full bg-gray-50 border border-gray-200 rounded p-2 text-sm outline-none">
                            <option value="">All Levels</option>
                            <option value="1" th:selected="${filterYear == 1}">Level 1</option>
                            <option value="2" th:selected="${filterYear == 2}">Level 2</option>
                            <option value="3" th:selected="${filterYear == 3}">Level 3</option>
                            <option value="4" th:selected="${filterYear == 4}">Level 4</option>
                        </select>
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Term (Semester)</label>
                        <select name="filterSemester" class="w-full bg-gray-50 border border-gray-200 rounded p-2 text-sm outline-none">
                            <option value="">All Terms</option>
                            <option value="1" th:selected="${filterSemester == 1}">Term 1</option>
                            <option value="2" th:selected="${filterSemester == 2}">Term 2</option>
                        </select>
                    </div>
                    <div class="flex items-end gap-2">
                        <button type="submit" class="bg-gray-800 text-white px-6 py-2 rounded font-bold shadow hover:bg-gray-900">Filter</button>
                        <a href="/admin/courses" class="bg-gray-200 text-gray-700 px-4 py-2 rounded font-bold hover:bg-gray-300">Clear</a>
                    </div>
                </form>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-50 text-gray-500 font-bold uppercase text-xs border-b border-gray-200">
                        <tr>
                            <th class="p-4">Code</th>
                            <th class="p-4">Title</th>
                            <th class="p-4">Dept</th>
                            <th class="p-4">Batch</th>
                            <th class="p-4">Type</th>
                            <th class="p-4 text-center">Slots/Class</th>
                            <th class="p-4 text-center">Classes/Wk</th>
                            <th class="p-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        <tr th:each="course : ${courses}" class="hover:bg-gray-50">
                            <td class="p-4 font-bold text-gray-800" th:text="${course.courseCode}"></td>
                            <td class="p-4 text-gray-600 font-medium" th:text="${course.title}"></td>
                            <td class="p-4 font-bold text-blue-600" th:text="${course.department.shortCode}"></td>
                            <td class="p-4">
                                <span class="bg-blue-50 text-blue-700 px-2 py-1 rounded text-xs font-bold" th:text="${'L' + course.year + 'T' + course.semester}"></span>
                            </td>
                            <td class="p-4">
                                <span th:if="${course.isLab}" class="text-purple-600 font-bold"><i class="fas fa-flask text-xs"></i> Lab</span>
                                <span th:unless="${course.isLab}" class="text-orange-600 font-bold"><i class="fas fa-book text-xs"></i> Theory</span>
                            </td>
                            <td class="p-4 text-center font-bold text-gray-700" th:text="${course.requiredSlots}"></td>
                            <td class="p-4 text-center font-bold text-gray-700" th:text="${course.weeklyClasses}"></td>
                            <td class="p-4 text-right flex justify-end gap-2">
                                <button th:onclick="editModal([[${course.id}]], [[${course.courseCode}]], [[${course.title}]], [[${course.department.id}]], [[${course.year}]], [[${course.semester}]], [[${course.isLab}]], [[${course.requiredSlots}]], [[${course.weeklyClasses}]])" 
                                        class="text-blue-500 hover:bg-blue-50 p-2 rounded transition"><i class="fas fa-edit"></i></button>
                                
                                <form th:action="@{/admin/courses/delete/{id}(id=${course.id})}" method="post" onsubmit="return confirm('Are you sure you want to delete this course?');">
                                    <button type="submit" class="text-red-500 hover:bg-red-50 p-2 rounded transition"><i class="fas fa-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(courses)}">
                            <td colspan="8" class="p-8 text-center text-gray-400 font-bold">No courses found matching your criteria.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="courseModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl w-[500px] shadow-2xl overflow-hidden">
            <div class="bg-gray-50 border-b border-gray-100 p-5 flex justify-between items-center">
                <h2 id="modalTitle" class="text-lg font-extrabold text-gray-900">Add New Course</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500"><i class="fas fa-times"></i></button>
            </div>
            
            <form th:action="@{/admin/courses/save}" method="post" class="p-6">
                <input type="hidden" id="courseId" name="id">
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">Course Code *</label>
                        <input type="text" id="courseCode" name="courseCode" required placeholder="e.g. CSE-311" class="w-full border rounded p-2 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">Department *</label>
                        <select id="departmentId" name="departmentId" required class="w-full border rounded p-2 outline-none focus:border-blue-500">
                            <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.shortCode}"></option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-bold text-gray-600 mb-1">Course Title *</label>
                    <input type="text" id="title" name="title" required placeholder="e.g. Data Structures" class="w-full border rounded p-2 outline-none focus:border-blue-500">
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">Level (Year) *</label>
                        <input type="number" id="year" name="year" min="1" max="5" required class="w-full border rounded p-2 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">Term (Semester) *</label>
                        <input type="number" id="semester" name="semester" min="1" max="3" required class="w-full border rounded p-2 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4 mb-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">Type *</label>
                        <select id="isLab" name="isLab" required class="w-full border rounded p-2 outline-none focus:border-blue-500">
                            <option value="false">Theory</option>
                            <option value="true">Lab</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">Slots/Class *</label>
                        <input type="number" id="requiredSlots" name="requiredSlots" required placeholder="1 or 3" class="w-full border rounded p-2 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">Classes/Wk *</label>
                        <input type="number" id="weeklyClasses" name="weeklyClasses" required placeholder="2" class="w-full border rounded p-2 outline-none focus:border-blue-500">
                    </div>
                </div>

                <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
                    <button type="button" onclick="closeModal()" class="px-5 py-2 bg-gray-100 text-gray-700 rounded font-bold hover:bg-gray-200">Cancel</button>
                    <button type="submit" class="px-5 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700">Save Course</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openModal() {
            document.getElementById('modalTitle').innerText = 'Add New Course';
            document.getElementById('courseId').value = '';
            document.getElementById('courseCode').value = '';
            document.getElementById('title').value = '';
            document.getElementById('year').value = '';
            document.getElementById('semester').value = '';
            document.getElementById('requiredSlots').value = '1';
            document.getElementById('weeklyClasses').value = '3';
            document.getElementById('courseModal').classList.remove('hidden');
        }

        function editModal(id, code, title, deptId, year, sem, isLab, slots, weekly) {
            document.getElementById('modalTitle').innerText = 'Edit Course';
            document.getElementById('courseId').value = id;
            document.getElementById('courseCode').value = code;
            document.getElementById('title').value = title;
            document.getElementById('departmentId').value = deptId;
            document.getElementById('year').value = year;
            document.getElementById('semester').value = sem;
            document.getElementById('isLab').value = isLab;
            document.getElementById('requiredSlots').value = slots;
            document.getElementById('weeklyClasses').value = weekly;
            document.getElementById('courseModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('courseModal').classList.add('hidden');
        }
        
        // Quality of life: Auto-fill typical parameters based on Lab/Theory selection
        document.getElementById('isLab').addEventListener('change', function(e) {
            if(e.target.value === 'true') {
                document.getElementById('requiredSlots').value = '3';
                document.getElementById('weeklyClasses').value = '1';
            } else {
                document.getElementById('requiredSlots').value = '1';
                document.getElementById('weeklyClasses').value = '3';
            }
        });
    </script>
</body>
</html>
