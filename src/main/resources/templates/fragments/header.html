<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <header th:fragment="header" id="mainHeader" class="h-[64px] mx-8 mt-6 bg-white/40 backdrop-blur-2xl border border-white/60 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] flex items-center justify-between px-6 sticky top-6 z-40 transition-transform duration-300 transform translate-y-0">
        
        <div class="relative w-96 group">
            <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-sm group-hover:text-blue-500 transition-colors"></i>
            <input type="text" placeholder="Search resources..." class="w-full bg-gray-100/50 hover:bg-gray-100 focus:bg-white text-sm border border-transparent focus:border-blue-200 rounded-xl py-2 pl-11 pr-4 focus:ring-4 focus:ring-blue-50 outline-none transition-all duration-300">
        </div>

        <div class="hidden md:flex gap-8 text-xs font-bold tracking-wider text-gray-400">
            <a href="/canvas" class="text-blue-600 bg-blue-50 px-4 py-2 rounded-lg transition-all shadow-sm">CANVAS</a>
            <a href="/schedules" class="hover:text-gray-800 hover:bg-gray-50 px-4 py-2 rounded-lg transition-all">SCHEDULES</a>
            <a href="/faculty" class="hover:text-gray-800 hover:bg-gray-50 px-4 py-2 rounded-lg transition-all">FACULTY</a>
        </div>
        
        <div class="flex items-center gap-5">
            <span th:if="${user != null}" class="bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg text-[10px] uppercase tracking-widest font-extrabold border border-blue-100" th:text="${user.role}">ROLE</span>
            <span th:unless="${user != null}" class="bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg text-[10px] uppercase tracking-widest font-extrabold border border-blue-100">GUEST</span>
            
            <div class="relative">
                <button id="btnNotifToggle" class="relative w-10 h-10 rounded-full flex items-center justify-center text-gray-500 hover:text-blue-600 hover:bg-blue-50 focus:outline-none transition-all">
                    <i class="fas fa-bell text-lg"></i>
                    <span id="notifBadge" class="hidden absolute top-2 right-2 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white animate-pulse"></span>
                </button>
                
                <div id="notifDropdown" class="hidden absolute right-0 mt-3 w-80 bg-white/90 backdrop-blur-xl rounded-2xl shadow-2xl border border-white/50 overflow-hidden transform opacity-0 scale-95 transition-all origin-top-right z-50">
                    <div class="px-4 py-3 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                        <span class="font-bold text-gray-900 text-sm">Notifications</span>
                        <span id="unreadCountBadge" class="hidden text-[10px] bg-blue-100 text-blue-700 font-bold px-2 py-0.5 rounded-full">0 New</span>
                    </div>
                    <div id="notifContainer" class="max-h-64 overflow-y-auto">
                        <!-- Notifications will be injected here -->
                        <div class="p-8 text-center text-gray-400">
                            <i class="fas fa-bell-slash text-2xl mb-2 opacity-20"></i>
                            <p class="text-xs">No notifications yet</p>
                        </div>
                    </div>
                    <div class="px-4 py-2 bg-gray-50/30 text-center border-t border-gray-100">
                        <button onclick="markAllNotificationsAsRead()" class="text-[11px] font-bold text-blue-600 hover:text-blue-800">Clear All</button>
                    </div>
                </div>
            </div>

            <a href="/settings" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-500 hover:text-blue-600 hover:bg-blue-50 transition-all"><i class="fas fa-cog text-lg"></i></a>
            
            <a href="/my-profile" class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-600 to-indigo-600 text-white flex items-center justify-center font-bold text-sm shadow-md cursor-pointer hover:shadow-lg transition-transform transform hover:-translate-y-0.5 border-2 border-white">
                <span th:text="${#strings.substring(user != null && user.name != null && !user.name.isEmpty() ? user.name : 'A', 0, 1)}">A</span>
            </a>
        </div>

        <!-- Notification Full View Modal -->
        <div id="notifModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
            <div class="absolute inset-0 bg-black/20 backdrop-blur-md" onclick="hideNotifModal()"></div>
            <div class="relative w-full max-w-lg bg-white/80 backdrop-blur-2xl border border-white/60 rounded-3xl shadow-2xl p-8 transform opacity-0 scale-95 transition-all duration-300">
                <button onclick="hideNotifModal()" class="absolute top-6 right-6 text-gray-400 hover:text-gray-600 transition-colors">
                    <i class="fas fa-times text-xl"></i>
                </button>
                <div class="flex items-center gap-4 mb-6">
                    <div id="modalIcon" class="w-12 h-12 rounded-2xl bg-blue-100 text-blue-600 flex items-center justify-center text-xl">
                        <i class="fas fa-bell"></i>
                    </div>
                    <div>
                        <h2 id="modalTitle" class="text-xl font-bold text-gray-900 leading-tight">Notification Title</h2>
                        <p id="modalTime" class="text-[10px] text-blue-600 font-bold uppercase tracking-widest mt-1">JUST NOW</p>
                    </div>
                </div>
                <div class="bg-gray-50/50 rounded-2xl p-6 border border-gray-100/50 mb-6">
                    <p id="modalMessage" class="text-gray-600 text-sm leading-relaxed italic">The message content will appear here...</p>
                </div>
                <button onclick="hideNotifModal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-2xl shadow-lg shadow-blue-200 transition-all active:scale-[0.98]">Got it!</button>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
                // Notification elements
                const btnNotifToggle = document.getElementById('btnNotifToggle');
                const notifDropdown = document.getElementById('notifDropdown');
                const notifContainer = document.getElementById('notifContainer');
                const notifBadge = document.getElementById('notifBadge');
                const unreadCountBadge = document.getElementById('unreadCountBadge');

                // Toggle dropdown
                if (btnNotifToggle && notifDropdown) {
                    btnNotifToggle.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const isHidden = notifDropdown.classList.contains('hidden');
                        if (isHidden) {
                            notifDropdown.classList.remove('hidden');
                            fetchNotifications();
                            setTimeout(() => {
                                notifDropdown.classList.remove('opacity-0', 'scale-95');
                                notifDropdown.classList.add('opacity-100', 'scale-100');
                            }, 10);
                        } else {
                            hideDropdown();
                        }
                    });

                    document.addEventListener('click', (e) => {
                        if (notifDropdown && !notifDropdown.contains(e.target) && !notifDropdown.classList.contains('hidden')) {
                            hideDropdown();
                        }
                    });
                }

                function hideDropdown() {
                    notifDropdown.classList.remove('opacity-100', 'scale-100');
                    notifDropdown.classList.add('opacity-0', 'scale-95');
                    setTimeout(() => notifDropdown.classList.add('hidden'), 150);
                }

                // Fetch and Render Notifications
                async function fetchNotifications() {
                    try {
                        const response = await fetch('/api/notifications');
                        if (response.ok) {
                            const data = await response.json();
                            renderNotifications(data.notifications, data.unreadCount);
                        }
                    } catch (error) {
                        console.error('Error fetching notifications:', error);
                    }
                }

                function renderNotifications(notifications, unreadCount) {
                    // Update badges
                    if (unreadCount > 0) {
                        notifBadge.classList.remove('hidden');
                        unreadCountBadge.classList.remove('hidden');
                        unreadCountBadge.textContent = `${unreadCount} New`;
                    } else {
                        notifBadge.classList.add('hidden');
                        unreadCountBadge.classList.add('hidden');
                    }

                    // Render list
                    if (notifications.length === 0) {
                        notifContainer.innerHTML = `
                            <div class="p-8 text-center text-gray-400">
                                <i class="fas fa-bell-slash text-2xl mb-2 opacity-20"></i>
                                <p class="text-xs">No notifications yet</p>
                            </div>`;
                        return;
                    }

                    notifContainer.innerHTML = notifications.map(n => `
                        <div class="block px-4 py-3 hover:bg-blue-50/50 border-b border-gray-50 transition cursor-pointer ${n.isRead ? 'opacity-60' : ''}" 
                             onclick='showNotifModal(${JSON.stringify(n)})'>
                            <div class="flex items-start gap-3">
                                <div class="w-8 h-8 rounded-full ${n.isRead ? 'bg-gray-100 text-gray-400' : 'bg-blue-100 text-blue-600'} flex items-center justify-center shrink-0 mt-0.5">
                                    <i class="fas ${n.title.toLowerCase().includes('welcome') ? 'fa-star' : (n.title.toLowerCase().includes('class') ? 'fa-clock' : 'fa-info-circle')} text-xs"></i>
                                </div>
                                <div class="flex-1">
                                    <p class="text-xs font-semibold text-gray-900">${n.title}</p>
                                    <p class="text-[11px] text-gray-500 mt-0.5 line-clamp-2">${n.message}</p>
                                    <p class="text-[9px] text-gray-400 font-bold mt-1 uppercase">${formatTime(n.createdAt)}</p>
                                </div>
                                ${!n.isRead ? '<div class="w-2 h-2 rounded-full bg-blue-600 mt-2"></div>' : ''}
                            </div>
                        </div>
                    `).join('');
                }

                window.showNotifModal = (notification) => {
                    const modal = document.getElementById('notifModal');
                    const modalContent = modal.querySelector('.relative.w-full');
                    
                    document.getElementById('modalTitle').textContent = notification.title;
                    document.getElementById('modalMessage').textContent = notification.message;
                    document.getElementById('modalTime').textContent = formatTime(notification.createdAt);
                    
                    // Update icon based on content
                    const icon = document.getElementById('modalIcon').querySelector('i');
                    if (notification.title.toLowerCase().includes('class')) icon.className = 'fas fa-clock';
                    else if (notification.title.toLowerCase().includes('welcome')) icon.className = 'fas fa-star';
                    else icon.className = 'fas fa-bell';

                    modal.classList.remove('hidden');
                    setTimeout(() => {
                        modalContent.classList.remove('opacity-0', 'scale-95');
                        modalContent.classList.add('opacity-100', 'scale-100');
                    }, 10);

                    if (!notification.isRead) {
                        markAsRead(notification.id);
                    }
                };

                window.hideNotifModal = () => {
                    const modal = document.getElementById('notifModal');
                    const modalContent = modal.querySelector('.relative.w-full');
                    modalContent.classList.remove('opacity-100', 'scale-100');
                    modalContent.classList.add('opacity-0', 'scale-95');
                    setTimeout(() => modal.classList.add('hidden'), 300);
                };

                window.markAsRead = async (id) => {
                    await fetch(`/api/notifications/${id}/read`, { method: 'POST' });
                    fetchNotifications();
                };

                window.markAllNotificationsAsRead = async () => {
                    await fetch('/api/notifications/mark-all-read', { method: 'POST' });
                    fetchNotifications();
                };

                function formatTime(dateStr) {
                    const date = new Date(dateStr);
                    const now = new Date();
                    const diff = Math.floor((now - date) / 1000);
                    if (diff < 60) return 'Just now';
                    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
                    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
                    return date.toLocaleDateString();
                }

                // Initial fetch and polling
                fetchNotifications();
                setInterval(fetchNotifications, 30000); // Poll every 30s

                // Navbar Scroll Logic
                let scrollTimeout;
                const header = document.getElementById('mainHeader');
                window.addEventListener('scroll', () => {
                    if (window.scrollY > 80) {
                        header.classList.add('-translate-y-[150%]');
                        window.clearTimeout(scrollTimeout);
                        scrollTimeout = setTimeout(() => header.classList.remove('-translate-y-[150%]'), 300);
                    } else {
                        header.classList.remove('-translate-y-[150%]');
                    }
                });
            });
        </script>

    </header>
</body>
</html>
