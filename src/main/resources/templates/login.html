<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - PlanR</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="auth-body">
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="login-card">
        <div class="brand">
            <div class="logo-icon">
                <i class="fas fa-layer-group text-white text-xl"></i>
            </div>
            <h1>Plan<span>R</span> Assets</h1>
            <p>Institutional Operations OS</p>
        </div>

        <!-- Error Alert -->
        <div th:if="${param.error}" class="alert alert-error">
            <i class="fas fa-circle-exclamation"></i>
            Invalid Username or Password
        </div>

        <!-- Logout Alert -->
        <div th:if="${param.logout}" class="alert alert-success">
            <i class="fas fa-circle-check"></i>
            Successfully logged out
        </div>

        <!-- Registration Success Alert -->
        <div th:if="${param.success}" class="alert alert-success">
            <i class="fas fa-circle-check"></i>
            Account created! Please sign in.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Corporate Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="username" name="username" required autofocus placeholder="admin@planr.com" class="auth-input" />
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" required placeholder="••••••••" class="auth-input" />
                </div>
            </div>
            
            <button type="submit" class="btn-submit">
                Access Workspace <i class="fas fa-arrow-right"></i>
            </button>

            <div class="footer-link">
                New to PlanR?
                <a th:href="@{/register}">Create Account</a>
            </div>
        </form>
    </div>
</body>

</html>
