<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - PlanR</title>
    <!-- Google Fonts: Inter -->

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="/css/fontawesome/all.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}">
  </head>

  <body class="auth-body">
  </head>

  <body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="register-card">
      <div class="brand">
        <div class="logo-icon">
          <i class="fas fa-layer-group text-white text-lg"></i>
        </div>
        <h1>Create <span>Account</span></h1>
      </div>

      <form
        th:action="@{/admin/users/create}"
        th:object="${registrationForm}"
        method="post"
      >
        <div class="form-grid">
          <!-- Full Name -->
          <div class="form-group">
            <label for="name">Full Name</label>
            <div class="input-wrapper">
              <i class="fas fa-user"></i>
                <input
                type="text"
                id="name"
                th:field="*{name}"
                placeholder="John Doe"
                autofocus
                class="auth-input"
              />
            </div>
            <span
              th:if="${#fields.hasErrors('name')}"
              th:errors="*{name}"
              class="error-message"
            ></span>
          </div>

          <!-- Email Address -->
          <div class="form-group">
            <label for="email">Corporate Email</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
                <input
                type="email"
                id="email"
                th:field="*{email}"
                placeholder="john@university.edu"
                class="auth-input"
              />
            </div>
            <span
              th:if="${#fields.hasErrors('email')}"
              th:errors="*{email}"
              class="error-message"
            ></span>
          </div>

          <!-- Role Selection -->
          <div class="form-group">
            <label for="role">Target Role</label>
            <div class="input-wrapper">
              <i class="fas fa-id-badge"></i>
              <select id="role" th:field="*{role}" class="auth-select">
                <option value="">-- Select Role --</option>
                <option
                  th:each="r : ${roles}"
                  th:value="${r}"
                  th:text="${r}"
                ></option>
              </select>
            </div>
            <span
              th:if="${#fields.hasErrors('role')}"
              th:errors="*{role}"
              class="error-message"
            ></span>
          </div>

          <!-- Department Selection -->
          <div class="form-group">
            <label for="departmentId">Domain / Department</label>
            <div class="input-wrapper">
              <i class="fas fa-building"></i>
              <select id="departmentId" th:field="*{departmentId}" class="auth-select">
                <option value="">-- Select Department --</option>
                <option
                  th:each="dept : ${departments}"
                  th:value="${dept.id}"
                  th:text="${dept.shortCode + ' - ' + dept.name}"
                ></option>
              </select>
            </div>
            <span
              th:if="${#fields.hasErrors('departmentId')}"
              th:errors="*{departmentId}"
              class="error-message"
            ></span>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label for="password">Security Identifier</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
                <input
                type="password"
                name="password"
                id="password"
                th:field="*{password}"
                required
                minlength="6"
                placeholder="Min. 6 strong characters"
                class="auth-input"
              />
            </div>
            <span
              th:if="${#fields.hasErrors('password')}"
              th:errors="*{password}"
              class="error-message"
            ></span>
          </div>
        </div>

        <button type="submit" class="btn-submit">
          Initialize Account <i class="fas fa-user-plus"></i>
        </button>

        <div class="footer-link">
          User Creation Done? <a th:href="@{/dashboard}">Back To Dashboard</a>
        </div>
      </form>
    </div>
  </body>
</html>
