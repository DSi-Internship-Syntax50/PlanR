version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: planr-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: planrdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d planrdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: planr-app
    restart: always
    ports:
      - "8080:8080" # Maps VPS port 8080 directly to container port 8080
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Safety Overrides for Production
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/planrdb
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=false
      - GROQ_API_KEY=${GROQ_API_KEY}

volumes:
  postgres_data:
