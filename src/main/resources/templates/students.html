<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Directory - PlanR</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-[#f3f6f8] font-['Inter',sans-serif]">

    <!-- Sidebar fragment -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="ml-64 flex flex-col min-h-screen">
        
        <!-- Header fragment -->
        <div th:replace="~{fragments/header :: header}"></div>

        <main class="flex-1 p-8">
            <div class="mb-8 flex justify-between items-end">
                <div>
                    <h1 class="text-4xl font-extrabold text-[#0a192f] tracking-tight">Student Directory</h1>
                    <p class="text-gray-500 font-medium mt-3 text-sm">View student details, batch information, and representatives.</p>
                </div>
                <div class="flex gap-3">
                    <a href="/settings" class="px-4 py-2 bg-[#0a192f] text-white font-bold rounded-lg text-xs shadow-md hover:bg-gray-800 transition-all flex items-center gap-2">
                        Manage Directory
                    </a>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-6">
                <!-- Students List -->
                <div class="col-span-12 bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col">
                    <h3 class="font-bold text-gray-900 mb-6 flex items-center gap-2">
                        <i class="fas fa-user-graduate text-blue-600"></i> Enrolled Students
                    </h3>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Dynamic Student Cards -->
                        <div th:each="student : ${students}" class="border border-gray-100 p-4 rounded-xl shadow-sm hover:shadow-md transition-shadow bg-[#fcfdfd]">
                            <div class="flex justify-between items-start mb-3">
                                <div class="flex items-center gap-3">
                                    <div class="w-12 h-12 rounded-full bg-blue-50 text-blue-600 border border-blue-200 font-bold flex items-center justify-center text-sm shadow-inner" 
                                         th:text="${student.name != null && student.name.length() >= 2 ? #strings.substring(student.name, 0, 2).toUpperCase() : 'ST'}">ST</div>
                                    <div>
                                        <h4 class="text-sm font-bold text-gray-900 leading-tight" th:text="${student.name}">Student Name</h4>
                                        <p class="text-xs text-gray-500 font-medium mt-0.5" th:text="${student.studentId != null ? 'ID: ' + student.studentId : 'ID: N/A'}">ID: N/A</p>
                                    </div>
                                </div>
                                <span th:if="${student.isCr != null && student.isCr}" class="bg-indigo-100 text-indigo-700 text-[9px] font-bold px-2 py-1 rounded border border-indigo-200">
                                    <i class="fas fa-star text-indigo-500 mr-1"></i> CR
                                </span>
                            </div>
                            
                            <div class="mt-4 flex flex-col gap-2 border-t border-gray-100 pt-3">
                                <div class="flex justify-between items-center text-xs">
                                    <span class="text-gray-500 font-medium">Department</span>
                                    <span class="font-bold text-gray-800" th:text="${student.department != null ? student.department.shortCode : 'General'}">DEPT</span>
                                </div>
                                <div class="flex justify-between items-center text-xs">
                                    <span class="text-gray-500 font-medium">Batch</span>
                                    <span class="font-bold text-gray-800" th:text="${student.currentBatch != null ? student.currentBatch : 'Unknown'}">Unknown</span>
                                </div>
                                <div class="flex justify-between items-center text-xs">
                                    <span class="text-gray-500 font-medium">Email</span>
                                    <span class="font-medium text-blue-600 truncate max-w-[150px]" th:title="${student.email}" th:text="${student.email != null ? student.email : 'N/A'}">email@example.com</span>
                                </div>
                            </div>
                        </div>
                        
                        <div th:if="${students == null || students.isEmpty()}" class="col-span-full text-center text-gray-500 text-sm py-8">
                            No students found in the directory.
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
