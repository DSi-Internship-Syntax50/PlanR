<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>
    <!-- Use th:block so we can inject the sidebar globally! -->
    <th:block th:fragment="sidebar">
        <!-- Premium Glass Sidebar Array -->
        <aside id="sidebarMenu"
            class="w-64 bg-white/40 backdrop-blur-2xl h-screen fixed left-0 top-0 border-r border-white/60 shadow-[4px_0_24px_rgba(37,99,235,0.04)] flex flex-col z-50 transition-all duration-300 overflow-hidden">

            <!-- Global Sidebar Blur Overlay (for depth) -->
            <div
                class="absolute top-[-10%] left-[-20%] w-[150%] h-[20%] bg-gradient-to-b from-blue-500/10 to-transparent pointer-events-none blur-xl">
            </div>

            <!-- Brand Context -->
            <div id="sidebarHeaderDiv"
                class="px-6 py-6 border-b border-gray-200/30 flex justify-between items-center group transition-all relative z-10">
                <div id="sidebarBrandContext"
                    class="transition-all overflow-hidden whitespace-nowrap flex items-center gap-3">
                    <div
                        class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-600 to-indigo-600 shadow-md flex items-center justify-center shrink-0 border border-blue-400/50">
                        <i class="fas fa-layer-group text-white text-xs"></i>
                    </div>
                    <div>
                        <a href="/dashboard" class="text-xl font-black text-gray-900 tracking-tight leading-none block">
                            Plan<span class="text-blue-600">R</span>
                        </a>

                    </div>
                </div>
                <!-- Hamburger Toggle -->
                <button id="btnToggleSidebar"
                    class="w-8 h-8 shrink-0 rounded-lg bg-white/50 border border-white hover:bg-white text-gray-500 hover:text-blue-600 flex items-center justify-center transition-all transform hover:scale-105 active:scale-95 text-xs shadow-sm shadow-black/5 backdrop-blur-sm">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 px-4 py-6 space-y-1.5 overflow-y-auto relative z-10 custom-scrollbar">

                <p class="nav-text text-[10px] font-bold text-gray-400 uppercase tracking-widest pl-3 mb-3 mt-1">Primary
                    Grid</p>



                <div sec:authorize="hasAnyRole('SUPERADMIN', 'COORDINATOR')">
                    <a href="/routine-builder"
                        class="sidebar-link group relative flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold text-gray-600 hover:text-gray-900 hover:bg-white/40 hover:shadow-sm hover:border hover:border-white transition-all duration-300">
                        <div
                            class="w-7 h-7 rounded-lg bg-gray-100/80 text-gray-400 group-hover:text-blue-500 group-hover:bg-blue-50 flex items-center justify-center shrink-0 transition-all group-hover:scale-110 border border-transparent group-hover:border-blue-100">
                            <i class="fas fa-table text-xs"></i>
                        </div>
                        <span class="nav-text">Routine Builder</span>
                    </a>
                </div>
                </div>

                <!-- Inactive Link Styling -->
                <a href="/allocation"
                    class="sidebar-link group relative flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold text-gray-600 hover:text-gray-900 hover:bg-white/40 hover:shadow-sm hover:border hover:border-white transition-all duration-300">
                    <div
                        class="w-7 h-7 rounded-lg bg-gray-100/80 text-gray-400 group-hover:text-blue-500 group-hover:bg-blue-50 flex items-center justify-center shrink-0 transition-all group-hover:scale-110 border border-transparent group-hover:border-blue-100">
                        <i class="fas fa-layer-group text-xs"></i>
                    </div>
                    <span class="nav-text">Room Allocation</span>
                </a>

                <a href="/operations"
                    class="sidebar-link group relative flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold text-gray-600 hover:text-gray-900 hover:bg-white/40 hover:shadow-sm hover:border hover:border-white transition-all duration-300">
                    <div
                        class="w-7 h-7 rounded-lg bg-gray-100/80 text-gray-400 group-hover:text-amber-500 group-hover:bg-amber-50 flex items-center justify-center shrink-0 transition-all group-hover:scale-110 border border-transparent group-hover:border-amber-100">
                        <i class="fas fa-calendar-alt text-xs"></i>
                    </div>
                    <span class="nav-text">Exam Seat Plan</span>
                </a>

                <a href="/events"
                    class="sidebar-link group relative flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold text-gray-600 hover:text-gray-900 hover:bg-white/40 hover:shadow-sm hover:border hover:border-white transition-all duration-300">
                    <div
                        class="w-7 h-7 rounded-lg bg-gray-100/80 text-gray-400 group-hover:text-green-500 group-hover:bg-green-50 flex items-center justify-center shrink-0 transition-all group-hover:scale-110 border border-transparent group-hover:border-green-100">
                        <i class="fas fa-calendar-plus text-xs"></i>
                    </div>
                    <span class="nav-text">Event Bookings</span>
                </a>

                <a href="/analytics"
                    class="sidebar-link group relative flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold text-gray-600 hover:text-gray-900 hover:bg-white/40 hover:shadow-sm hover:border hover:border-white transition-all duration-300">
                    <div
                        class="w-7 h-7 rounded-lg bg-gray-100/80 text-gray-400 group-hover:text-purple-500 group-hover:bg-purple-50 flex items-center justify-center shrink-0 transition-all group-hover:scale-110 border border-transparent group-hover:border-purple-100">
                        <i class="fas fa-chart-line text-xs"></i>
                    </div>
                    <span class="nav-text">Analytics</span>
                </a>
                <div sec:authorize="hasRole('SUPERADMIN')">
                    <p class="nav-text text-[10px] font-bold text-gray-400 uppercase tracking-widest pl-3 mb-3 mt-4">
                        Admin Hub</p>
                    <a th:href="@{/admin/users/create}"
                        class="sidebar-link group relative flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold text-gray-600 hover:text-gray-900 hover:bg-white/40 hover:shadow-sm hover:border hover:border-white transition-all duration-300">
                        <div
                            class="w-7 h-7 rounded-lg bg-gray-100/80 text-gray-400 group-hover:text-indigo-500 group-hover:bg-indigo-50 flex items-center justify-center shrink-0 transition-all group-hover:scale-110 border border-transparent group-hover:border-indigo-100">
                            <i class="fas fa-user-shield text-xs"></i>
                        </div>
                        <span class="nav-text">Create User</span>
                    </a>

                    <a th:href="@{/admin/courses}" sec:authorize="hasRole('SUPERADMIN')"
                        class="sidebar-link group relative flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold text-gray-600 hover:text-gray-900 hover:bg-white/40 hover:shadow-sm hover:border hover:border-white transition-all duration-300">
                        <div
                            class="w-7 h-7 rounded-lg bg-gray-100/80 text-gray-400 group-hover:text-cyan-500 group-hover:bg-cyan-50 flex items-center justify-center shrink-0 transition-all group-hover:scale-110 border border-transparent group-hover:border-cyan-100">
                            <i class="fas fa-book-open text-xs"></i>
                        </div>
                        <span class="nav-text">Course Manager</span>
                    </a>

                </div>
                
                <p class="nav-text text-[10px] font-bold text-gray-400 uppercase tracking-widest pl-3 mb-3 mt-4">Account</p>
                <form id="logoutForm" th:action="@{/logout}" method="post" class="hidden"></form>
                <a href="javascript:void(0)" onclick="document.getElementById('logoutForm').submit();"
                    class="sidebar-link group relative flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold text-gray-600 hover:text-red-600 hover:bg-red-50/50 hover:shadow-sm transition-all duration-300 mt-auto">
                    <div class="w-7 h-7 rounded-lg bg-gray-100/80 text-gray-400 group-hover:text-red-500 group-hover:bg-red-50 flex items-center justify-center shrink-0 transition-all group-hover:scale-110 border border-transparent group-hover:border-red-100">
                        <i class="fas fa-sign-out-alt text-xs"></i>
                    </div>
                    <span class="nav-text">Logout</span>
                </a>
            </nav>


        </aside>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
                // Inline Sidebar Minify toggle
                const sidebar = document.getElementById('sidebarMenu');
                const btnToggle = document.getElementById('btnToggleSidebar');
                const textElements = document.querySelectorAll('.nav-text');
                const brandContext = document.getElementById('sidebarBrandContext');
                const headerDiv = document.getElementById('sidebarHeaderDiv');

                let isMinimized = false;

                if (btnToggle && sidebar) {
                    btnToggle.addEventListener('click', () => {
                        isMinimized = !isMinimized;
                        if (isMinimized) {
                            sidebar.classList.remove('w-64');
                            sidebar.classList.add('w-[84px]'); // slightly wider collapse for the new icon styling
                            brandContext.classList.add('hidden');
                            headerDiv.classList.remove('px-6', 'justify-between');
                            headerDiv.classList.add('px-0', 'justify-center');
                            textElements.forEach(el => el.classList.add('hidden'));
                        } else {
                            sidebar.classList.remove('w-[84px]');
                            sidebar.classList.add('w-64');
                            brandContext.classList.remove('hidden');
                            headerDiv.classList.remove('px-0', 'justify-center');
                            headerDiv.classList.add('px-6', 'justify-between');
                            textElements.forEach(el => el.classList.remove('hidden'));
                        }
                    });
                }

                // Set Active Link State Dynamically
                const currentPath = window.location.pathname;
                const sidebarLinks = document.querySelectorAll('.sidebar-link');

                sidebarLinks.forEach(link => {
                    const href = link.getAttribute('href');
                    if (!href || href === '#' || href.startsWith('javascript')) return;
                    
                    let isActive = false;
                    if (href === '/' && currentPath === '/') {
                        isActive = true;
                    } else if (href !== '/' && currentPath.startsWith(href)) {
                        if (currentPath === href || currentPath.charAt(href.length) === '/') {
                            isActive = true;
                        }
                    }

                    if (isActive) {
                        // Change link wrapper to active styling
                        link.className = "sidebar-link group relative flex items-center gap-3 px-3 py-3 rounded-xl text-sm font-bold text-blue-700 bg-white/60 shadow-sm border border-white transition-all duration-300 hover:-translate-y-[1px]";
                        
                        // Inject the active indicator line
                        const indicator = document.createElement('div');
                        indicator.className = "absolute left-[-16px] top-1/2 -translate-y-1/2 w-1.5 h-6 bg-blue-600 rounded-r-full shadow-[0_0_8px_rgba(37,99,235,0.4)]";
                        link.insertBefore(indicator, link.firstChild);
                        
                        // Change the inner icon box to active styling
                        const iconDiv = link.querySelector('div.w-7');
                        if (iconDiv) {
                            iconDiv.className = "w-7 h-7 rounded-lg bg-blue-100 text-blue-600 flex items-center justify-center shrink-0 transition-transform group-hover:scale-110 shadow-inner";
                        }
                    }
                });
            });
        </script>

        <style>
            /* Custom scrollbar for sidebar */
            .custom-scrollbar::-webkit-scrollbar {
                width: 4px;
            }

            .custom-scrollbar::-webkit-scrollbar-thumb {
                background: rgba(203, 213, 225, 0.4);
                border-radius: 4px;
            }

            .custom-scrollbar:hover::-webkit-scrollbar-thumb {
                background: rgba(148, 163, 184, 0.6);
            }
        </style>
    </th:block>
</body>

</html>
