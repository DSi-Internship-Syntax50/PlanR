<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanR Dashboard</title>
    
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .custom-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(15, 23, 42, 0.05);
            border: 1px solid var(--sec-border);
            margin-bottom: 25px;
            animation: slideInUp 0.5s ease-out forwards;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dashboard-header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .dashboard-header h1 {
            font-size: 1.8rem;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">
        
        <div th:replace="~{fragments/header :: header}"></div>

        <div class="page-container">
            <div class="dashboard-header">
                <h1>Dashboard</h1>
            </div>

            <div class="custom-card">
                <h2>Welcome to PlanR Dashboard!</h2>
                <p style="color: var(--text-light); margin-top: 10px;">You have successfully logged in.</p>
                <div style="margin-top: 20px;">
                    <a th:href="@{/my-profile}" style="color: var(--primary); font-weight: 600; text-decoration: none;">
                        <i class="fa-solid fa-arrow-right"></i> Go to Profile
                    </a>
                </div>
            </div>
            
        </div>
        
    </div>

</body>
</html>
